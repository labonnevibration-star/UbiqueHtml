<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Inscription — UBIQUE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#070A12;
      --bg2:#0B1220;
      --card: rgba(18,24,33,.92);
      --line: rgba(255,255,255,.10);
      --text:#EAF0FF;
      --muted:#9AA6C3;
      --accent:#F04E23;
      --accent2:#FF7A3D;
      --shadow: 0 30px 90px rgba(0,0,0,.55);
      --radius: 16px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 16px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 600px at 20% -10%, rgba(240,78,35,.18), transparent 60%),
        radial-gradient(900px 600px at 85% 0%, rgba(255,122,61,.12), transparent 55%),
        linear-gradient(180deg, var(--bg2), var(--bg));
    }
