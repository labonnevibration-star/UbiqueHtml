<script>
/** ✅ À REMPLACER si tu changes d'URL Apps Script */
const GS_URL = "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec";

/** ✅ Doit matcher exactement WRITE_KEY côté Apps Script */
const WRITE_KEY = "UBIQUE_2026_SECURE";

/**
 * Attend:
 *  - input#firstName
 *  - input#lastName
 *  - input#email   (readOnly OK)
 *  - input#handle
 *  - button#btnCreate
 *  - div#status
 */
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("btnCreate");
  if (!btn) return;

  btn.addEventListener("click", createProfileAndGoStrava);
});

async function createProfileAndGoStrava() {
  const btn = document.getElementById("btnCreate");
  const status = document.getElementById("status");

  const firstName = (document.getElementById("firstName")?.value || "").trim();
  const lastName  = (document.getElementById("lastName")?.value || "").trim();
  const email     = (document.getElementById("email")?.value || "").trim().toLowerCase();
  const handle    = (document.getElementById("handle")?.value || "").trim();

  if (!firstName || !lastName || !email || !handle) {
    if (status) {
      status.textContent = "Remplis tous les champs.";
      status.style.color = "#ef4444";
    } else {
      alert("Remplis tous les champs.");
    }
    return;
  }

  // UI loading
  if (btn) {
    btn.disabled = true;
    btn.classList.add("loading");
    btn.textContent = "Création…";
  }
  if (status) {
    status.textContent = "Création du profil dans Google Sheet…";
    status.style.color = "#94a3b8";
  }

  try {
    // 1) Create athlete row (Apps Script)
    const res = await fetch(GS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        key: WRITE_KEY,
        mode: "createAthlete",
        email,
        first_name: firstName,
        last_name: lastName,
        handle,
        created_at: new Date().toISOString()
      })
    });

    const text = await res.text();

    let json;
    try {
      json = JSON.parse(text);
    } catch {
      throw new Error("Apps Script n'a pas renvoyé du JSON: " + text.slice(0, 120));
    }

    if (!res.ok || json.ok !== true) {
      throw new Error("Apps Script error: " + JSON.stringify(json).slice(0, 220));
    }

    if (status) {
      status.textContent = "OK ✔ Redirection vers Strava…";
      status.style.color = "#22c55e";
    }

    // 2) Redirect to Strava auth (Netlify function)
    // ✅ IMPORTANT: ton strava-auth DOIT accepter email + handle en query
    const url =
      "/.netlify/functions/strava-auth" +
      "?email=" + encodeURIComponent(email) +
      "&handle=" + encodeURIComponent(handle);

    window.location.href = url;

  } catch (err) {
    console.error(err);
    if (status) {
      status.textContent = "Erreur: " + (err?.message || err);
      status.style.color = "#ef4444";
    } else {
      alert("Erreur: " + (err?.message || err));
    }
    if (btn) {
      btn.disabled = false;
      btn.classList.remove("loading");
      btn.textContent = "Continuer vers Strava";
    }
  }
}
</script>
