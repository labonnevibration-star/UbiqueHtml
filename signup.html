<script>

document.addEventListener("DOMContentLoaded", () => {

  const GS_URL = "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec";
  const WRITE_KEY = "UBIQUE_2026_SECURE";

  const params = new URLSearchParams(window.location.search);
  const email = params.get("email");

  const emailInput = document.getElementById("email");
  const status = document.getElementById("status");

  if(!email){
    status.textContent = "Email manquant. Retourne à l'accueil.";
    status.style.color = "#ef4444";
    return;
  }

  emailInput.value = email;

  window.createProfile = async function(){

    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const handle = document.getElementById("handle").value.trim();

    if(!firstName || !lastName || !handle){
      alert("Remplis tous les champs");
      return;
    }

    status.textContent = "Création du profil...";
    status.style.color = "#94a3b8";

    try{

      const response = await fetch(GS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          key: WRITE_KEY,
          mode: "createAthlete",
          email: email,
          first_name: firstName,
          last_name: lastName,
          handle: handle
        })
      });

      if(!response.ok){
        throw new Error("HTTP error " + response.status);
      }

      const result = await response.json();

      if(result.ok !== true){
        throw new Error("Apps Script returned invalid response");
      }

      status.textContent = "Profil créé ✔ Redirection...";
      status.style.color = "#22c55e";

      setTimeout(()=>{
        window.location.href =
          "/connect.html?email=" +
          encodeURIComponent(email);
      }, 800);

    }catch(e){
      console.error("SIGNUP ERROR:", e);
      status.textContent = "Erreur serveur.";
      status.style.color = "#ef4444";
    }

  };

});

</script>
