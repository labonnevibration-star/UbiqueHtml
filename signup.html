<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE — Création profil</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent1:#ff512f;
  --accent2:#dd2476;
  --text:#e2e8f0;
  --muted:#94a3b8;
  --success:#22c55e;
  --error:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#111827);
  font-family:system-ui,-apple-system;
  color:var(--text);
}

.card{
  width:100%;
  max-width:480px;
  padding:60px 45px;
  border-radius:24px;
  background:var(--card);
  box-shadow:0 40px 80px rgba(0,0,0,.6);
  text-align:center;
  animation:fade .4s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

h1{
  margin-bottom:35px;
  font-size:26px;
  letter-spacing:.5px;
}

input{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  background:#0f172a;
  color:white;
  font-size:16px;
  text-align:center;
  margin-bottom:15px;
  outline:none;
  transition:.2s;
}

input:focus{
  background:#111827;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  margin-top:20px;
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  color:white;
  transition:.25s;
}

button:hover{
  transform:translateY(-2px);
}

button.loading{
  opacity:.6;
  pointer-events:none;
}

.status{
  margin-top:20px;
  font-size:14px;
  min-height:24px;
  color:var(--muted);
}
</style>
</head>
<body>

<div class="card">
  <h1>🔥 Créer ton profil</h1>

  <input type="text" id="firstName" placeholder="Prénom">
  <input type="text" id="lastName" placeholder="Nom">
  <input type="email" id="email" readonly>
  <input type="text" id="handle" placeholder="Pseudo (classement)">

  <button id="btnCreate">Continuer vers Strava</button>

  <div id="status" class="status"></div>
</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

  const params = new URLSearchParams(window.location.search);
  const email = params.get("email");

  if(!email){
    window.location.href = "/";
    return;
  }

  document.getElementById("email").value = email.toLowerCase();

  const btn = document.getElementById("btnCreate");
  const status = document.getElementById("status");

  btn.addEventListener("click", async function(){

    const firstName = document.getElementById("firstName").value.trim();
    const lastName  = document.getElementById("lastName").value.trim();
    const handle    = document.getElementById("handle").value.trim();

    if(!firstName || !lastName || !handle){
      status.style.color = "#ef4444";
      status.textContent = "Remplis tous les champs.";
      return;
    }

    btn.classList.add("loading");
    status.style.color = "#94a3b8";
    status.textContent = "Création du profil...";

    try{

      const response = await fetch("/.netlify/functions/create-athlete",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          email:email.toLowerCase(),
          first_name:firstName,
          last_name:lastName,
          handle:handle
        })
      });

      const result = await response.json();

      if(result.ok !== true){
        throw new Error("Backend rejected");
      }

      status.style.color = "#22c55e";
      status.textContent = "Profil créé ✔ Redirection...";

      setTimeout(()=>{
        window.location.href =
          "/.netlify/functions/strava-auth?email=" +
          encodeURIComponent(email.toLowerCase());
      },800);

    }catch(e){
      console.error(e);
      status.style.color = "#ef4444";
      status.textContent = "Erreur serveur.";
      btn.classList.remove("loading");
    }

  });

});
</script>

</body>
</html>
