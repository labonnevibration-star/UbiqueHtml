<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Inscription — UBIQUE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0c1117;
  --card:#161b22;
  --border:#2a2f36;
  --text:#e6edf3;
  --muted:#8b949e;
  --accent:#f04e23;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:
    radial-gradient(800px 500px at 20% -10%, rgba(240,78,35,.15), transparent 60%),
    #0c1117;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}

.card{
  width:100%;
  max-width:480px;
  background:var(--card);
  padding:45px 40px;
  border-radius:14px;
  border:1px solid var(--border);
  box-shadow:0 30px 80px rgba(0,0,0,.6);
}

h2{
  font-size:22px;
  margin-bottom:8px;
}

.subtitle{
  font-size:14px;
  color:var(--muted);
  margin-bottom:30px;
}

.field{
  margin-bottom:18px;
}

label{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
  letter-spacing:1px;
  text-transform:uppercase;
}

input,select{
  width:100%;
  padding:14px;
  background:#0f141b;
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-size:14px;
  transition:.15s ease;
}

input:focus,select:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(240,78,35,.2);
}

button{
  width:100%;
  margin-top:10px;
  padding:16px;
  background:var(--accent);
  border:none;
  border-radius:8px;
  color:white;
  font-weight:800;
  letter-spacing:1px;
  cursor:pointer;
  transition:.15s ease;
}

button:hover{
  background:#ff6238;
  transform:translateY(-2px);
}

.footer{
  margin-top:28px;
  text-align:center;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="card">

  <h2>Inscription</h2>
  <div class="subtitle">Rejoins le challenge. Discipline quotidienne.</div>

  <form id="signupForm">

    <div class="field">
      <label>Nom</label>
      <input type="text" id="name" required>
    </div>

    <div class="field">
      <label>Pseudo</label>
      <input type="text" id="handle">
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>

    <div class="field">
      <label>Règle</label>
      <select id="rule">
        <option value="1km">1 km / jour</option>
        <option value="3km">3 km / jour</option>
      </select>
    </div>

    <button type="submit">CONTINUER</button>

  </form>

  <div class="footer">
    Stay hard.
  </div>

</div>

<script>
const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec";

document.getElementById("signupForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const emailValue = document.getElementById("email").value.trim();

  const payload = new URLSearchParams({
    name: document.getElementById("name").value.trim(),
    handle: document.getElementById("handle").value.trim(),
    email: emailValue,
    rule: document.getElementById("rule").value,
    created_at: new Date().toISOString()
  });

  try {
    await fetch(ENDPOINT_URL,{
      method:"POST",
      body:payload,
      mode:"no-cors"
    });

    // 🔥 Redirection avec email
    window.location.href = "/connect.html?email=" + encodeURIComponent(emailValue);

  } catch(err) {
    alert("Erreur lors de l'inscription.");
  }
});
</script>

</body>
</html>
