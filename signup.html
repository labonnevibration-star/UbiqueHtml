<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE — Création profil</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  font-family:system-ui;
  color:white;
}
.card{
  width:420px;
  padding:40px;
  border-radius:20px;
  background:#1e293b;
  text-align:center;
}
input{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff512f,#dd2476);
  color:white;
  font-weight:bold;
}
.status{
  margin-top:15px;
  font-size:14px;
}
</style>
</head>
<body>

<div class="card">
  <h2>Créer ton profil</h2>

  <input type="text" id="firstName" placeholder="Prénom">
  <input type="text" id="lastName" placeholder="Nom">
  <input type="email" id="email">
  <input type="text" id="handle" placeholder="Pseudo">

  <button onclick="createProfile()">Continuer</button>

  <div id="status" class="status"></div>
</div>

<script>

window.onload = function(){

  const params = new URLSearchParams(window.location.search);
  const email = params.get("email");

  if(email){
    document.getElementById("email").value = email;
  }

}

async function createProfile(){

  document.getElementById("status").innerText = "Bouton cliqué ✔";

}

</script>

</body>
</html>
