:root{
  --bg:#0b0f14;
  --card:#121821;
  --border:#1f2630;
  --text:#e6edf3;
  --muted:#7d8590;
  --accent:#f04e23;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:

  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:420px;
  background:var(--card);
  padding:40px 35px;
  border-radius:12px;
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

h2{
  margin-bottom:8px;
  font-weight:600;
}

.subtitle{
  color:var(--muted);
  font-size:14px;
  margin-bottom:30px;
}

  margin-bottom:16px;
  background:#0f141b;
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  font-size:14px;
  transition:.15s;
}

input:focus,select:focus{
  outline:none;
  border-color:var(--accent);
}
