<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent1:#ff512f;
  --accent2:#dd2476;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#111827);
  font-family:system-ui;
  color:var(--text);
}

.card{
  width:100%;
  max-width:460px;
  padding:60px 45px;
  border-radius:22px;
  background:var(--card);
  box-shadow:0 40px 80px rgba(0,0,0,.6);
  text-align:center;
}

h1{
  margin-bottom:35px;
  font-size:26px;
}

input{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  background:#0f172a;
  color:white;
  font-size:16px;
  text-align:center;
  margin-bottom:25px;
  outline:none;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  color:white;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
}

.status{
  margin-top:20px;
  font-size:14px;
  color:var(--muted);
  min-height:22px;
}
</style>
</head>
<body>

<div class="card">
  <h1>🔥 UBIQUE</h1>

  <input type="email" id="email" placeholder="Ton email">

  <button id="btnContinue">Continuer</button>

  <div id="status" class="status"></div>
</div>

<script>

const GS_URL = "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec";

const emailInput = document.getElementById("email");
const btnContinue = document.getElementById("btnContinue");
const statusText = document.getElementById("status");

btnContinue.addEventListener("click", async ()=>{

  const email = emailInput.value.trim().toLowerCase();

  if(!email){
    alert("Entre ton email");
    return;
  }

  statusText.textContent = "Vérification...";
  btnContinue.disabled = true;

  try{

    const res = await fetch(GS_URL + "?mode=getAthletes");
    const data = await res.json();

    const athletes = Array.isArray(data.athletes) ? data.athletes : [];

    const found = athletes.find(a =>
      (a.email || "").toLowerCase().trim() === email
    );

    // ❌ N'existe pas
    if(!found){
      window.location.href =
        "/signup.html?email=" +
        encodeURIComponent(email);
      return;
    }

    // Vérifie vrai refresh_token
    const token = (found.refresh_token || "").toString().trim();

    const hasToken =
      token !== "" &&
      token !== "null" &&
      token !== "undefined" &&
      found.athlete_id;

    // ⚠️ Existe mais pas connecté
    if(!hasToken){
      window.location.href =
        "/connect.html?email=" +
        encodeURIComponent(email);
      return;
    }

    // ✅ Existe + connecté
    window.location.href =
      "/dashboard.html?email=" +
      encodeURIComponent(email);

  }catch(e){
    statusText.textContent = "Erreur serveur";
  }

  btnContinue.disabled = false;
});

</script>

</body>
</html>
