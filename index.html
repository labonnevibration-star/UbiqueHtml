<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:#161b22;
  padding:40px;
  border-radius:16px;
  width:100%;
  max-width:420px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,.4);
}
h1{
  margin-bottom:25px;
}
input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  font-size:16px;
  margin-bottom:20px;
  background:#0d1117;
  color:white;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  transition:0.2s ease;
}
.primary{
  background:linear-gradient(90deg,#ff512f,#dd2476);
  color:white;
}
.primary:hover{
  transform:scale(1.03);
}
.secondary{
  background:#2f3640;
  color:white;
}
.hidden{
  display:none;
}
.status{
  margin-bottom:15px;
  font-size:14px;
  color:#8b949e;
}
</style>
</head>

<body>

<div class="card">

  <h1>🔥 UBIQUE</h1>

  <input type="email" id="email" placeholder="Ton email">

  <div id="status" class="status"></div>

  <button id="actionBtn" class="primary" onclick="handleAction()">
    Continuer
  </button>

</div>

<script>

const GS_URL = "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec";

let isRegistered = false;

const emailInput = document.getElementById("email");
const statusText = document.getElementById("status");
const actionBtn = document.getElementById("actionBtn");

// 🔥 Auto load email si déjà sauvegardé
document.addEventListener("DOMContentLoaded", ()=>{
  const saved = localStorage.getItem("ubique_email");
  if(saved){
    emailInput.value = saved;
    checkRegistration(saved);
  }
});

// 🔥 Vérification auto après saisie
emailInput.addEventListener("blur", ()=>{
  const email = emailInput.value.trim();
  if(email){
    checkRegistration(email);
  }
});

async function checkRegistration(email){

  statusText.textContent = "Vérification...";
  isRegistered = false;

  try{
    const res = await fetch(GS_URL + "?mode=getAthletes");
    const data = await res.json();
    const athletes = data.athletes || [];

    const found = athletes.find(a =>
      a.email.toLowerCase() === email.toLowerCase()
    );

    if(found){
      isRegistered = true;
      statusText.textContent = "Athlète déjà inscrit ✅";
      actionBtn.textContent = "Accéder au Dashboard";
      actionBtn.className = "primary";
    }else{
      isRegistered = false;
      statusText.textContent = "Nouveau participant";
      actionBtn.textContent = "S'inscrire au challenge";
      actionBtn.className = "secondary";
    }

  }catch(e){
    statusText.textContent = "Erreur serveur";
  }
}

function handleAction(){

  const email = emailInput.value.trim();

  if(!email){
    alert("Entre ton email");
    return;
  }

  localStorage.setItem("ubique_email", email);

  if(isRegistered){
    window.location.href = "/dashboard.html";
  }else{
    window.location.href = "/signup.html?email=" + encodeURIComponent(email);
  }
}

</script>

</body>
</html>
