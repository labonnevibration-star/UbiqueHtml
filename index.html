<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0b0f14;
  --card:#121821;
  --text:#e6edf3;
  --muted:#7d8590;
  --accent:#f04e23;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  text-align:center;
  max-width:420px;
  padding:40px 30px;
}

h1{
  font-size:14px;
  letter-spacing:4px;
  color:var(--muted);
  margin-bottom:40px;
}

.quote{
  font-size:22px;
  font-weight:600;
  line-height:1.4;
  margin-bottom:50px;
}

.button{
  display:inline-block;
  padding:16px 40px;
  background:var(--accent);
  color:white;
  text-decoration:none;
  font-weight:700;
  letter-spacing:1px;
  border-radius:4px;
  transition:all .15s ease;
}

.button:hover{
  background:#ff6238;
  transform:translateY(-2px);
}

.footer{
  margin-top:60px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

  <h1>UBIQUE</h1>

  <div class="quote">
    You don’t know me son.
  </div>

  <a href="/signup.html" class="button">
    STAY HARD
  </a>

  <div class="footer">
    Discipline. Constance. Zéro excuse.
  </div>

</div>

</body>
</html>
