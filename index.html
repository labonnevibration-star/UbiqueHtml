<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#111827);
  font-family:system-ui;
  color:white;
}

.card{
  background:#1e293b;
  padding:50px;
  border-radius:20px;
  width:100%;
  max-width:400px;
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  border-radius:12px;
  border:none;
  background:#0f172a;
  color:white;
  font-size:16px;
  margin-bottom:20px;
  text-align:center;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(90deg,#ff512f,#dd2476);
  color:white;
}
</style>
</head>

<body>

<div class="card">
  <h2>🔥 UBIQUE</h2>
  <input type="email" id="email" placeholder="Ton email">
  <button onclick="go()">Continuer</button>
</div>

<script>

function go(){

  const email = document.getElementById("email").value.trim();

  if(!email){
    alert("Entre ton email");
    return;
  }

  localStorage.setItem("ubique_email", email);

  window.location.href =
    window.location.origin +
    "/.netlify/functions/strava-auth?email=" +
    encodeURIComponent(email.toLowerCase().trim());
}

</script>

</body>
</html>
