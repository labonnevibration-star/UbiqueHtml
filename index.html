<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent1:#ff512f;
  --accent2:#dd2476;
  --text:#e2e8f0;
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#111827);
  font-family:system-ui;
  color:var(--text);
}

.card{
  width:100%;
  max-width:420px;
  padding:60px 40px;
  border-radius:20px;
  background:var(--card);
  text-align:center;
}

h1{
  margin-bottom:35px;
  font-size:26px;
}

input{
  width:100%;
  padding:16px;
  border-radius:12px;
  border:none;
  background:#0f172a;
  color:white;
  font-size:16px;
  text-align:center;
  margin-bottom:20px;
  outline:none;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(90deg,#ff512f,#dd2476);
  color:white;
}
</style>
</head>
<body>

<div class="card">
  <h1>🔥 UBIQUE</h1>

  <input type="email" id="email" placeholder="Ton email">
  <button onclick="routeUser()">Continuer</button>
</div>

<script>

const GS_URL = "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec";

async function routeUser(){

  const email = document.getElementById("email").value.trim().toLowerCase();

  if(!email){
    alert("Entre ton email");
    return;
  }

  try {

    const res = await fetch(GS_URL + "?mode=getAthletes");
    const data = await res.json();
    const athletes = Array.isArray(data.athletes) ? data.athletes : [];

    const user = athletes.find(a =>
      (a.email || "").toLowerCase().trim() === email
    );

    // ❌ PAS EXISTANT → inscription ailleurs
    if(!user){
      window.location.href =
        "/signup.html?email=" +
        encodeURIComponent(email);
      return;
    }

    // Vérifie refresh_token
    const token = (user.refresh_token || "").toString().trim();

    const connected =
      token !== "" &&
      token !== "null" &&
      token !== "undefined" &&
      user.athlete_id;

    // ⚠️ Existe mais pas connecté
    if(!connected){
      window.location.href =
        "/connect.html?email=" +
        encodeURIComponent(email);
      return;
    }

    // ✅ Existe + connecté
    window.location.href =
      "/dashboard.html?email=" +
      encodeURIComponent(email);

  } catch(err){
    alert("Erreur serveur.");
  }
}

</script>

</body>
</html>
