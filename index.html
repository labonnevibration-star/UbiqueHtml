<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent1:#ff512f;
  --accent2:#dd2476;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#111827);
  font-family:system-ui,-apple-system;
  color:var(--text);
}

.card{
  width:100%;
  max-width:460px;
  padding:55px 45px;
  border-radius:22px;
  background:var(--card);
  box-shadow:0 40px 80px rgba(0,0,0,.6);
  text-align:center;
  animation:fadeIn .5s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

h1{
  margin:0 0 35px 0;
  font-size:26px;
  letter-spacing:.5px;
}

input{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  background:#0f172a;
  color:white;
  font-size:16px;
  text-align:center;
  outline:none;
  margin-bottom:18px;
}

.status{
  height:22px;
  font-size:14px;
  margin-bottom:25px;
  color:var(--muted);
  transition:.3s;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:.25s;
  margin-top:10px;
}

.primary{
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  color:white;
}

.secondary{
  background:#2f3640;
  color:white;
}

button:hover{
  transform:translateY(-2px);
}

.hidden{
  display:none;
}
</style>
</head>
<body>

<div class="card">
  <h1>🔥 UBIQUE</h1>

  <input type="email" id="email" placeholder="Ton email">

  <div id="status" class="status"></div>

  <button id="btnDashboard" class="primary hidden">Accéder au Dashboard</button>
  <button id="btnConnect" class="secondary hidden">Connecter Strava</button>
  <button id="btnSignup" class="secondary hidden">Créer un compte</button>
</div>

<script>

const GS_URL = "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec";

const emailInput = document.getElementById("email");
const statusText = document.getElementById("status");

const btnDashboard = document.getElementById("btnDashboard");
const btnConnect = document.getElementById("btnConnect");
const btnSignup = document.getElementById("btnSignup");

function resetButtons(){
  btnDashboard.classList.add("hidden");
  btnConnect.classList.add("hidden");
  btnSignup.classList.add("hidden");
}

emailInput.addEventListener("blur", async ()=>{

  const email = emailInput.value.trim().toLowerCase();
  if(!email) return;

  resetButtons();
  statusText.textContent = "Vérification...";

  try{

    const res = await fetch(GS_URL + "?mode=getAthletes");
    const data = await res.json();

    const athletes = Array.isArray(data.athletes) ? data.athletes : [];

    const found = athletes.find(a =>
      (a.email || "").toLowerCase().trim() === email
    );

    if(!found){
      statusText.textContent = "Nouvel utilisateur";
      btnSignup.classList.remove("hidden");
      return;
    }

    const hasToken =
      found.refresh_token &&
      found.refresh_token.length > 30 &&
      found.athlete_id;

    if(hasToken){
      statusText.textContent = "Compte connecté à Strava";
      btnDashboard.classList.remove("hidden");
    }else{
      statusText.textContent = "Compte existant – connecter Strava";
      btnConnect.classList.remove("hidden");
    }

  }catch(e){
    statusText.textContent = "Erreur serveur";
  }

});

btnDashboard.onclick = ()=>{
  window.location.href = "/dashboard.html";
};

btnConnect.onclick = ()=>{
  const email = emailInput.value.trim().toLowerCase();
  window.location.href =
    window.location.origin +
    "/.netlify/functions/strava-auth?email=" +
    encodeURIComponent(email);
};

btnSignup.onclick = ()=>{
  const email = emailInput.value.trim().toLowerCase();
  window.location.href =
    "/signup.html?email=" +
    encodeURIComponent(email);
};

</script>

</body>
</html>
