<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE — Challenge Goggins</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:#0B1220;
  color:#EAF0FF;
  display:flex;
  justify-content:center;
  padding:40px 20px;
}
.card{
  width:520px;
  background:#111C36;
  padding:30px;
  border-radius:16px;
}
h1{margin-top:0}
input,select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:none;
}
button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-weight:800;
  background:linear-gradient(90deg,#22D3EE,#60A5FA);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h1>Challenge Goggins</h1>
<p>Inscription au défi.</p>

<form id="signupForm">

<input type="text" id="name" placeholder="Nom" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="dept" placeholder="Département (optionnel)">
<select id="rule" required>
  <option value="1km">1 km / jour</option>
  <option value="3km">3 km / jour</option>
</select>
<input type="text" id="handle" placeholder="Pseudo (optionnel)">

<button type="submit">Je m’inscris</button>

</form>

</div>

<script>

const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec";

document.getElementById("signupForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const payload = new URLSearchParams({
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    dept: document.getElementById("dept").value.trim(),
    rule: document.getElementById("rule").value,
    handle: document.getElementById("handle").value.trim(),
    created_at: new Date().toISOString()
  });

  await fetch(ENDPOINT_URL, { method:"POST", body:payload, mode:"no-cors" });

  window.location.href = "/connect.html";

});

</script>

</body>
</html>
