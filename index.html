<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#111827);
  font-family:system-ui;
  color:white;
}
.card{
  background:#1e293b;
  padding:50px;
  border-radius:20px;
  width:100%;
  max-width:420px;
  text-align:center;
  box-shadow:0 30px 60px rgba(0,0,0,.5);
}
input{
  width:100%;
  padding:15px;
  border-radius:12px;
  border:none;
  background:#0f172a;
  color:white;
  font-size:16px;
  margin-bottom:20px;
  text-align:center;
}
.status{
  font-size:14px;
  margin-bottom:20px;
  min-height:20px;
  color:#94a3b8;
}
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}
.primary{
  background:linear-gradient(90deg,#ff512f,#dd2476);
  color:white;
}
.secondary{
  background:#2f3640;
  color:white;
}
</style>
</head>
<body>

<div class="card">
  <h2>🔥 UBIQUE</h2>
  <input type="email" id="email" placeholder="Ton email">
  <div id="status" class="status"></div>
  <button id="actionBtn" class="primary">Continuer</button>
</div>

<script>

const GS_URL = "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec";

let userState = "unknown"; 
// new | noToken | connected

const emailInput = document.getElementById("email");
const statusText = document.getElementById("status");
const actionBtn = document.getElementById("actionBtn");

emailInput.addEventListener("blur", ()=>{
  const email = emailInput.value.trim();
  if(email){
    checkEmail(email);
  }
});

actionBtn.addEventListener("click", ()=>{

  const email = emailInput.value.trim();

  if(!email){
    alert("Entre ton email");
    return;
  }

  const emailClean = email.toLowerCase().trim();
  localStorage.setItem("ubique_email", emailClean);

  if(userState === "connected"){
    window.location.href = "/dashboard.html";
    return;
  }

  if(userState === "noToken"){
    window.location.href =
      window.location.origin +
      "/.netlify/functions/strava-auth?email=" +
      encodeURIComponent(emailClean);
    return;
  }

  if(userState === "new"){
    window.location.href =
      "/signup.html?email=" +
      encodeURIComponent(emailClean);
    return;
  }

});

async function checkEmail(email){

  statusText.textContent = "Vérification...";
  userState = "unknown";

  try{

    const emailClean = email.toLowerCase().trim();

    const res = await fetch(GS_URL + "?mode=getAthletes");
    const data = await res.json();

    const athletes = Array.isArray(data.athletes)
      ? data.athletes
      : [];

    let found = null;

    for(const a of athletes){
      const sheetEmail = (a.email || "")
        .toString()
        .toLowerCase()
        .trim();

      if(sheetEmail === emailClean){
        found = a;
        break;
      }
    }

    if(!found){
      userState = "new";
      statusText.textContent = "Nouvel utilisateur";
      actionBtn.textContent = "Créer un compte";
      actionBtn.className = "secondary";
      return;
    }

    const token = (found.refresh_token || "").trim();
    const athleteId = found.athlete_id;

    if(token && token.length > 30 && athleteId){
      userState = "connected";
      statusText.textContent = "Déjà connecté à Strava ✅";
      actionBtn.textContent = "Accéder au Dashboard";
      actionBtn.className = "primary";
    }else{
      userState = "noToken";
      statusText.textContent = "Compte existant – connecter Strava";
      actionBtn.textContent = "Connecter Strava";
      actionBtn.className = "secondary";
    }

  }catch(e){
    statusText.textContent = "Erreur serveur";
  }
}

</script>

</body>
</html>
