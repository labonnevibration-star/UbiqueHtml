<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>UBIQUE — Challenge Goggins</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      margin:0;
      background:#0B1220;
      color:#EAF0FF;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display:flex;
      justify-content:center;
      padding:40px 20px;
    }
    .card{
      width:520px;
      background:#111C36;
      padding:28px;
      border-radius:16px;
    }
    h1{margin-top:0;}
    .cta{
      display:block;
      width:100%;
      padding:14px;
      border-radius:12px;
      font-weight:800;
      text-align:center;
      text-decoration:none;
      margin-top:14px;
      background:linear-gradient(90deg,#22D3EE,#60A5FA);
      color:#06101b;
    }
    .field{margin-bottom:12px;}
    input,select{
      width:100%;
      padding:10px;
      border-radius:10px;
      border:none;
    }
    button{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:none;
      font-weight:800;
      background:#22D3EE;
      color:#06101b;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>Challenge Goggins</h1>

  <p>Discipline. Constance. Zéro excuse.</p>

  <!-- 🔥 BOUTON STRAVA -->
  <a 
    href="https://www.strava.com/oauth/authorize?client_id=200307&response_type=code&redirect_uri=https%3A%2F%2Fubique.netlify.app%2F.netlify%2Ffunctions%2Fstrava-auth&approval_prompt=auto&scope=read,activity:read_all"
    class="cta">
    Connecter avec Strava
  </a>

  <hr style="margin:20px 0; opacity:0.3;">

  <!-- FORMULAIRE INSCRIPTION -->
  <form id="signupForm">
    <div class="field">
      <input type="text" id="name" placeholder="Nom" required>
    </div>

    <div class="field">
      <input type="email" id="email" placeholder="Email" required>
    </div>

    <div class="field">
      <input type="text" id="dept" placeholder="Département (optionnel)">
    </div>

    <div class="field">
      <select id="rule" required>
        <option value="1km">1 km / jour</option>
        <option value="3km">3 km / jour</option>
      </select>
    </div>

    <div class="field">
      <input type="text" id="handle" placeholder="Pseudo (optionnel)">
    </div>

    <button type="submit">Je m’inscris</button>
  </form>

</div>

<script>
const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec";

document.getElementById("signupForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const payload = new URLSearchParams({
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    dept: document.getElementById("dept").value.trim(),
    rule: document.getElementById("rule").value,
    handle: document.getElementById("handle").value.trim(),
    created_at: new Date().toISOString()
  });

  await fetch(ENDPOINT_URL, { method: "POST", body: payload, mode: "no-cors" });

  alert("Inscription envoyée. Stay hard.");
});
</script>

</body>
</html>
