<script>

const GS_URL = "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec";

let isRegistered = false;
let loading = false;

const emailInput = document.getElementById("email");
const statusText = document.getElementById("status");
const actionBtn = document.getElementById("actionBtn");

document.addEventListener("DOMContentLoaded", ()=>{
  const saved = localStorage.getItem("ubique_email");
  if(saved){
    emailInput.value = saved;
    checkRegistration(saved);
  }
});

emailInput.addEventListener("blur", ()=>{
  const email = emailInput.value.trim();
  if(email){
    checkRegistration(email);
  }
});

async function checkRegistration(email){

  setLoading(true);
  isRegistered = false;
  statusText.textContent = "Vérification...";

  try{

    const res = await fetch(GS_URL + "?mode=getAthletes");
    const data = await res.json();
    const athletes = Array.isArray(data.athletes) ? data.athletes : [];

    const emailClean = email.toLowerCase().trim();

    const found = athletes.find(a => {

      if(!a.email) return false;

      const sheetEmail = String(a.email).toLowerCase().trim();
      if(sheetEmail !== emailClean) return false;

      const token = (a.refresh_token || "").toString().trim();

      // Token Strava valide = long string alphanumérique
      const tokenValid =
        token.length > 30 &&
        token !== "null" &&
        token !== "undefined";

      return tokenValid;
    });

    if(found){
      isRegistered = true;
      statusText.textContent = "Connecté à Strava ✅";
      actionBtn.textContent = "Accéder au Dashboard";
      actionBtn.className = "primary";
    }else{
      isRegistered = false;
      statusText.textContent = "Non connecté à Strava";
      actionBtn.textContent = "Se connecter à Strava";
      actionBtn.className = "secondary";
    }

  }catch(e){
    console.error(e);
    statusText.textContent = "Erreur serveur";
  }

  setLoading(false);
}

function handleAction(){

  if(loading) return;

  const email = emailInput.value.trim();

  if(!email){
    alert("Entre ton email");
    return;
  }

  localStorage.setItem("ubique_email", email);

  if(isRegistered){
    window.location.href = "/dashboard.html";
  }else{
    window.location.href = "/signup.html?email=" + encodeURIComponent(email);
  }
}

function setLoading(state){

  loading = state;

  if(state){
    actionBtn.innerHTML = '<span class="loader"></span>';
    actionBtn.disabled = true;
  }else{
    actionBtn.disabled = false;

    // remet le texte correct après loading
    if(isRegistered){
      actionBtn.textContent = "Accéder au Dashboard";
      actionBtn.className = "primary";
    }else{
      actionBtn.textContent = "Se connecter à Strava";
      actionBtn.className = "secondary";
    }
  }
}

</script>
