<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE — Live Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#0d1117;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:30px;
}
.container{
  max-width:1100px;
  margin:auto;
}
h1{
  margin-bottom:30px;
}
canvas{
  background:#161b22;
  border-radius:14px;
  padding:20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 UBIQUE — Weekly Performance</h1>
  <canvas id="chart"></canvas>
</div>

<script>

const OBJECTIF_JOUR = 1;
const JOURS = 7;

window.onload = function(){

  const stats = {
    "Lolo": {
      "2026-02-22":1,
      "2026-02-23":1,
      "2026-02-24":0.4,
      "2026-02-25":1,
      "2026-02-26":0,
      "2026-02-27":1,
      "2026-02-28":1
    },
    "Gabcar": {
      "2026-02-22":1,
      "2026-02-23":1,
      "2026-02-24":1,
      "2026-02-25":1,
      "2026-02-26":1,
      "2026-02-27":1,
      "2026-02-28":1
    }
  };

  buildChart(stats);
};

function buildChart(stats){

  const ctx = document.getElementById("chart").getContext("2d");
  const athletes = Object.keys(stats);

  const doneData = [];
  const missingData = [];

  athletes.forEach(a=>{

    let done = 0;
    let missing = 0;

    Object.values(stats[a]).forEach(km=>{
      if(km >= OBJECTIF_JOUR){
        done += OBJECTIF_JOUR;
      }else{
        done += km;
        missing += (OBJECTIF_JOUR - km);
      }
    });

    doneData.push(done);
    missingData.push(missing);
  });

  const gradient = ctx.createLinearGradient(0,0,600,0);
  gradient.addColorStop(0,"#ff512f");
  gradient.addColorStop(1,"#dd2476");

  new Chart(ctx,{
    type:"bar",
    data:{
      labels:athletes,
      datasets:[
        {
          label:"KM faits",
          data:doneData,
          backgroundColor:gradient,
          stack:"total",
          borderRadius:8
        },
        {
          label:"KM manquants",
          data:missingData,
          backgroundColor:"#2f3640",
          stack:"total",
          borderRadius:8
        }
      ]
    },
    options:{
      indexAxis:"y",
      responsive:true,
      scales:{
        x:{
          stacked:true,
          max:OBJECTIF_JOUR*JOURS,
          ticks:{color:"white"}
        },
        y:{
          stacked:true,
          ticks:{color:"white"}
        }
      },
      plugins:{
        legend:{
          labels:{color:"white"}
        }
      }
    }
  });

}

</script>

</body>
</html>
