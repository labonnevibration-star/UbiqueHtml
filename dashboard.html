<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE — Weekly Timeline</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#0d1117;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:20px;
}
.container{
  max-width:1200px;
  margin:auto;
}
h1{
  font-size:22px;
  margin-bottom:25px;
}
button{
  padding:14px 22px;
  background:linear-gradient(90deg,#ff512f,#dd2476);
  border:none;
  border-radius:8px;
  color:white;
  font-weight:700;
  cursor:pointer;
  margin-bottom:35px;
}
button:hover{opacity:0.9;}
canvas{
  background:#161b22;
  border-radius:14px;
  padding:20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 UBIQUE — Timeline Semaine</h1>
  <button onclick="runSync()">Sync & Afficher</button>
  <canvas id="chart"></canvas>
</div>

<script>

let chartInstance=null;

async function runSync(){

  await fetch("/.netlify/functions/sync-activities");

  const res = await fetch("https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec?mode=getWeeklyStats");
  const data = await res.json();

  if(!data.stats){
    alert("Erreur récupération stats");
    return;
  }

  buildChart(data.stats);
}

function buildChart(stats){

  if(chartInstance) chartInstance.destroy();

  const ctx=document.getElementById("chart").getContext("2d");
  const athletes=Object.keys(stats);

  const today=new Date();
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();
    d.setDate(today.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }

  const totals = athletes.map(a=>{
    return days.reduce((sum,d)=> sum + (stats[a][d] || 0), 0);
  });

  const gradient = ctx.createLinearGradient(0,0,600,0);
  gradient.addColorStop(0,"#ff512f");
  gradient.addColorStop(1,"#dd2476");

  const customPlugin={
    id:'timelinePlugin',
    afterDatasetsDraw(chart){

      const {ctx, scales} = chart;
      ctx.save();
      ctx.font="12px sans-serif";
      ctx.fillStyle="white";

      athletes.forEach((athlete,i)=>{

        let cumulative=0;
        const y = scales.y.getPixelForValue(i);

        days.forEach(day=>{
          const km = stats[athlete][day] || 0;
          if(km===0) return;

          const xStart = scales.x.getPixelForValue(cumulative);
          const xEnd = scales.x.getPixelForValue(cumulative + km);

          // Crochet début
          ctx.beginPath();
          ctx.moveTo(xStart,y-10);
          ctx.lineTo(xStart,y-20);
          ctx.strokeStyle="white";
          ctx.stroke();

          // Crochet fin
          ctx.beginPath();
          ctx.moveTo(xEnd,y-10);
          ctx.lineTo(xEnd,y-20);
          ctx.stroke();

          // Date centrée
          ctx.textAlign="center";
          ctx.fillText(
            day.slice(5),
            (xStart+xEnd)/2,
            y-25
          );

          cumulative+=km;
        });

      });

      ctx.restore();
    }
  };

  chartInstance=new Chart(ctx,{
    type:"bar",
    data:{
      labels:athletes,
      datasets:[{
        data:totals,
        backgroundColor:gradient,
        borderRadius:8
      }]
    },
    options:{
      indexAxis:'y',
      responsive:true,
      plugins:{
        legend:{display:false}
      },
      scales:{
        x:{
          beginAtZero:true,
          ticks:{color:"white"}
        },
        y:{
          ticks:{color:"white"}
        }
      }
    },
    plugins:[customPlugin]
  });

}

</script>

</body>
</html>
