<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE — Segmented Weekly</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:30px;
}
.container{
  max-width:1100px;
  margin:auto;
}
h1{
  margin-bottom:25px;
}
canvas{
  background:#161b22;
  border-radius:14px;
  padding:20px;
}
button{
  padding:12px 20px;
  background:linear-gradient(90deg,#ff512f,#dd2476);
  border:none;
  border-radius:10px;
  color:white;
  font-weight:800;
  cursor:pointer;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Weekly Performance</h1>
<button onclick="loadData()">Sync</button>
<canvas id="chart" height="450"></canvas>

</div>

<script>

const OBJECTIF = 1;
let chart;

function last7Days(){
  const t=new Date();
  const arr=[];
  for(let i=6;i>=0;i--){
    const d=new Date();
    d.setDate(t.getDate()-i);
    arr.push(d.toISOString().slice(0,10));
  }
  return arr;
}

async function loadData(){

  let stats;

  try{
    const res = await fetch("https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec?mode=getWeeklyStats");
    const data = await res.json();
    stats = data.stats;
  }catch(e){
    // fallback
    stats={
      "Lolo":{"2026-02-22":1,"2026-02-23":0,"2026-02-24":0.5,"2026-02-25":1,"2026-02-26":1,"2026-02-27":0,"2026-02-28":1},
      "Gabcar":{"2026-02-22":1,"2026-02-23":1,"2026-02-24":1,"2026-02-25":1,"2026-02-26":1,"2026-02-27":1,"2026-02-28":1}
    };
  }

  render(stats);
}

function render(stats){

  const ctx = document.getElementById("chart").getContext("2d");
  if(chart) chart.destroy();

  const days = last7Days();
  const athletes = Object.keys(stats);

  const totals = athletes.map(a=>{
    return days.reduce((sum,d)=> sum + (stats[a][d]||0),0);
  });

  const gradient = ctx.createLinearGradient(0,0,0,400);
  gradient.addColorStop(0,"#ff512f");
  gradient.addColorStop(1,"#dd2476");

  const segmentPlugin = {
    id:"segments",
    afterDatasetsDraw(chart){

      const {ctx, scales} = chart;
      ctx.save();
      ctx.font="11px sans-serif";
      ctx.textAlign="center";

      athletes.forEach((athlete,i)=>{

        let cumulative=0;
        const x = scales.x.getPixelForValue(i);
        const bar = chart.getDatasetMeta(0).data[i];
        const barWidth = bar.width;
        const baseY = scales.y.getPixelForValue(0);

        days.forEach(day=>{

          const km = stats[athlete][day]||0;
          const height = km;
          const yStart = scales.y.getPixelForValue(cumulative);
          const yEnd = scales.y.getPixelForValue(cumulative+km);

          const segmentHeight = yStart - yEnd;

          ctx.fillStyle = km>0 ? gradient : "#000";
          ctx.fillRect(
            x - barWidth/2,
            yEnd,
            barWidth,
            segmentHeight
          );

          // date text
          ctx.fillStyle="white";
          ctx.fillText(
            day.slice(5),
            x,
            yEnd + segmentHeight/2
          );

          cumulative += km;
        });

      });

      ctx.restore();
    }
  };

  chart = new Chart(ctx,{
    type:"bar",
    data:{
      labels:athletes,
      datasets:[{
        data:totals,
        backgroundColor:"transparent"
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:"#c9d1d9"}},
        y:{
          beginAtZero:true,
          ticks:{color:"#8b949e"}
        }
      }
    },
    plugins:[segmentPlugin]
  });

}

window.onload=loadData;

</script>

</body>
</html>
