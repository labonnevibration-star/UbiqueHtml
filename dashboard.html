  <button onclick="runSync()">Sync & Afficher</button>
  <canvas id="chart"></canvas>

<script>

// 🔥 Plugin pour afficher total au bout des barres
const totalPlugin = {
  id: 'totalPlugin',
  afterDatasetsDraw(chart){
    const {ctx} = chart;
    ctx.save();
    ctx.fillStyle = "white";
    ctx.font = "bold 14px sans-serif";

    chart.data.labels.forEach((label,index)=>{
      let total = 0;
      chart.data.datasets.forEach(dataset=>{
        total += dataset.data[index] || 0;
      });

      const meta = chart.getDatasetMeta(0);
      const bar = meta.data[index];
      if(bar){
        ctx.fillText(
          total.toFixed(1)+" km",
          bar.x + 10,
          bar.y + 4
        );
      }
    });

    ctx.restore();
  }
};

async function runSync(){

  await fetch("/.netlify/functions/sync-activities");

  const res = await fetch("https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec?mode=getWeeklyStats");
  const data = await res.json();
  buildChart(data.stats);
}

function buildChart(stats){

  const ctx = document.getElementById("chart").getContext("2d");

  const today = new Date();
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(today.getDate() - i);
    days.push(d.toISOString().split("T")[0]);
  }

    "#f04e23",
    "#ff7a45",
    "#ff9b63",
    "#ffb580",
    "#ffc89c",
    "#ffd8b5",
    "#ffe6cc"
  ];

  const datasets = days.map((day,index)=>({
    label: day,
    data: Object.keys(stats).map(athlete => {

      const value = stats[athlete][day];

      if(!value || value === 0){
        return 0.2; // segment visuel minimal
      }

      return Number(value.toFixed(2));
    }),
    backgroundColor: Object.keys(stats).map(athlete=>{
      const value = stats[athlete][day];
      return (!value || value === 0) ? "#2a2f36" : colors[index];
    })
  }));

  new Chart(ctx,{
    type:"bar",
    data:{
      labels: Object.keys(stats),
      datasets: datasets
    },

      responsive:true,
      plugins:{
        legend:{ labels:{ color:"white" }},
        tooltip:{
          callbacks:{
            label:function(context){
              if(context.raw === 0.2){
                return "KM non fait";
              }
              return context.raw + " km";
            }
          }
        }
