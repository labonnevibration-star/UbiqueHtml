<script>

let chartInstance = null;
const OBJECTIF_JOUR = 1;
const JOURS = 7;

const GS_URL =
"https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec?mode=getWeeklyStats";

function last7DaysISO(){
  const today = new Date();
  today.setHours(0,0,0,0);
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today);
    d.setDate(today.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }
  return days;
}

async function runSync(){

  await fetch("/.netlify/functions/sync-activities");

  const res = await fetch(GS_URL);
  const data = await res.json();

  if(!data.stats){
    alert("Erreur récupération stats");
    return;
  }

  buildChart(data.stats);
}

function buildChart(stats){

  if(chartInstance) chartInstance.destroy();

  const ctx = document.getElementById("chart").getContext("2d");

  const athletes = Object.keys(stats);
  const days = last7DaysISO();
  const labels = days.map(d=>d.slice(5));

  const gradient = ctx.createLinearGradient(0,0,0,420);
  gradient.addColorStop(0,"#ff512f");
  gradient.addColorStop(1,"#dd2476");

  const datasets = [];

  athletes.forEach((athlete,index)=>{

    const doneData = [];
    const missingData = [];

    days.forEach(day=>{

      const km = stats[athlete][day] || 0;

      const done = Math.min(km, OBJECTIF_JOUR);
      const missing = OBJECTIF_JOUR - done;

      doneData.push(done);
      missingData.push(missing);
    });

    datasets.push({
      label: athlete + " ✓",
      data: doneData,
      backgroundColor: gradient,
      stack: "athlete_"+index,
      borderRadius: 6
    });

    datasets.push({
      label: athlete + " ✗",
      data: missingData,
      backgroundColor: "#05070a",
      stack: "athlete_"+index,
      borderRadius: 6
    });

  });

  chartInstance = new Chart(ctx,{
    type:"bar",
    data:{
      labels: labels,
      datasets: datasets
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:{
        duration:700
      },
      plugins:{
        legend:{
          labels:{
            color:"#c9d1d9",
            font:{weight:"600"}
          }
        },
        tooltip:{
          callbacks:{
            label:function(ctx){
              const value = ctx.raw;
              if(ctx.dataset.label.includes("✗")){
                if(value>0){
                  return "Non fait: "+value.toFixed(2)+" km";
                }
                return "Objectif atteint";
              }
              return "Fait: "+value.toFixed(2)+" km";
            }
          }
        }
      },
      scales:{
        x:{
          stacked:false,
          ticks:{color:"#c9d1d9"},
          grid:{color:"#21262d"}
        },
        y:{
          beginAtZero:true,
          max:OBJECTIF_JOUR,
          ticks:{color:"#8b949e"},
          grid:{color:"#21262d"},
          title:{
            display:true,
            text:"KM par jour (objectif "+OBJECTIF_JOUR+" km)",
            color:"#c9d1d9"
          }
        }
      }
    }
  });
}

window.onload = runSync;

</script>
