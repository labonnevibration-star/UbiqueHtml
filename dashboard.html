<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE — Weekly Performance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:30px;
}
.container{ max-width:1100px; margin:auto; }
h1{ margin-bottom:18px; }
button{
  padding:12px 20px;
  background:linear-gradient(90deg,#ff512f,#dd2476);
  border:none;
  border-radius:10px;
  color:white;
  font-weight:900;
  cursor:pointer;
  margin-bottom:20px;
  box-shadow:0 10px 24px rgba(221,36,118,.25);
}
canvas{
  background:#161b22;
  border-radius:14px;
  padding:18px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 UBIQUE — Weekly Challenge</h1>
  <button onclick="loadData()">Sync Premium</button>
  <canvas id="chart" height="520"></canvas>
</div>

<script>

const OBJECTIF = 1;
const JOURS = 7;
let chartInstance = null;

function getLast7Days(){
  const today = new Date();
  today.setHours(0,0,0,0);
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today);
    d.setDate(today.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }
  return days;
}

async function loadData(){

  try{
    await fetch("/.netlify/functions/sync-activities");
  }catch(e){}

  let stats={};

  try{
    const res = await fetch("https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec?mode=getWeeklyStats");
    const data = await res.json();
    stats = data.stats || {};
  }catch(e){
    alert("Erreur chargement stats");
    return;
  }

  renderChart(stats);
}

function renderChart(stats){

  const ctx = document.getElementById("chart").getContext("2d");
  if(chartInstance) chartInstance.destroy();

  const days = getLast7Days();
  let athletes = Object.keys(stats);

  if(athletes.length === 0){
    alert("Aucune donnée");
    return;
  }

  // 🔥 Total réel par athlète
  const totalsReal = athletes.map(a=>{
    return days.reduce((sum,d)=> sum + (Number(stats?.[a]?.[d] || 0)),0);
  });

  // 🔥 TRI meilleur en premier
  athletes = athletes
    .map((name,i)=>({name,total:totalsReal[i]}))
    .sort((a,b)=>b.total-a.total)
    .map(o=>o.name);

  const sortedTotals = athletes.map(a=>{
    return days.reduce((sum,d)=> sum + (Number(stats?.[a]?.[d] || 0)),0);
  });

  const maxReal = Math.max(...sortedTotals, OBJECTIF * JOURS);

  const gradient = ctx.createLinearGradient(0,0,0,600);
  gradient.addColorStop(0,"#ff512f");
  gradient.addColorStop(1,"#dd2476");

  const segmentPlugin = {
    id:"segmentPlugin",
    afterDatasetsDraw(chart){

      const {ctx, scales} = chart;
      ctx.save();
      ctx.textAlign="center";

      athletes.forEach((athlete,index)=>{

        const bar = chart.getDatasetMeta(0).data[index];
        if(!bar) return;

        const x = scales.x.getPixelForValue(index);
        const width = bar.width;

        let cumulative = 0;
        let realTotal = 0;

        days.forEach(day=>{

          const kmReal = Number(stats?.[athlete]?.[day] || 0);
          realTotal += kmReal;

          const yStart = scales.y.getPixelForValue(cumulative);
          const yEnd   = scales.y.getPixelForValue(cumulative + OBJECTIF);
          const height = yStart - yEnd;

          const valid = kmReal >= OBJECTIF;

          ctx.fillStyle = valid ? gradient : "#000";
          ctx.fillRect(x - width/2, yEnd, width, height);

          ctx.font="10px sans-serif";
          ctx.textBaseline="middle";
          ctx.fillStyle = valid ? "#0d1117" : "#fff";
          ctx.fillText(day.slice(5), x, yEnd + height/2);

          if(!valid){
            ctx.font="bold 9px sans-serif";
            ctx.fillStyle="#ff4d4d";
            ctx.fillText("MISS", x, yEnd + height/2 + 10);
          }

          cumulative += OBJECTIF;
        });

        // 🔥 TOTAL RÉEL positionné à sa vraie hauteur
        const yReal = scales.y.getPixelForValue(realTotal);

        ctx.font="bold 15px sans-serif";
        ctx.fillStyle="#ffffff";
        ctx.textBaseline="bottom";
        ctx.fillText(realTotal.toFixed(2)+" km", x, yReal - 6);

      });

      ctx.restore();
    }
  };

  chartInstance = new Chart(ctx,{
    type:"bar",
    data:{
      labels:athletes,
      datasets:[{
        data:athletes.map(()=> OBJECTIF * JOURS),
        backgroundColor:"transparent"
      }]
    },
    options:{
      responsive:true,
      plugins:{ legend:{display:false} },
      scales:{
        x:{
          ticks:{ color:"#c9d1d9" },
          grid:{ color:"#21262d" }
        },
        y:{
          beginAtZero:true,
          max: Math.ceil(maxReal),
          ticks:{ color:"#8b949e", stepSize:1 },
          grid:{ color:"#21262d" },
          title:{
            display:true,
            text:"Kilomètres cumulés (réels)",
            color:"#c9d1d9"
          }
        }
      }
    },
    plugins:[segmentPlugin]
  });
}

window.onload = loadData;

</script>

</body>
</html>
