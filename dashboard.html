<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:20px;
}
.container{
  max-width:1100px;
  margin:auto;
}
h1{
  font-size:22px;
  margin-bottom:20px;
}
button{
  padding:14px 20px;
  background:#f04e23;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:700;
  cursor:pointer;
  margin-bottom:30px;
}
button:hover{ background:#ff6238; }
canvas{
  background:#161b22;
  border-radius:12px;
  padding:20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 UBIQUE — 7 derniers jours</h1>
  <button onclick="runSync()">Sync & Afficher</button>
  <canvas id="chart"></canvas>
</div>

<script>

let chartInstance = null;

// 🔥 Affiche total au bout des barres
const totalPlugin = {
  id:'totalPlugin',
  afterDatasetsDraw(chart){
    const {ctx} = chart;
    ctx.save();
    ctx.fillStyle="white";
    ctx.font="bold 13px sans-serif";

    chart.data.labels.forEach((label,i)=>{
      let total=0;
      chart.data.datasets.forEach(ds=>{
        total += ds.data[i] || 0;
      });

      const meta = chart.getDatasetMeta(0);
      if(meta.data[i]){
        ctx.fillText(
          total.toFixed(1)+" km",
          meta.data[i].x + 10,
          meta.data[i].y + 4
        );
      }
    });

    ctx.restore();
  }
};

async function runSync(){

  // Lance sync Netlify
  await fetch("/.netlify/functions/sync-activities");

  // Récupère stats
  const res = await fetch("https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec?mode=getWeeklyStats");
  const data = await res.json();

  if(!data.stats){
    alert("Erreur récupération stats");
    return;
  }

  buildChart(data.stats);
}

function buildChart(stats){

  if(chartInstance){
    chartInstance.destroy();
  }

  const ctx = document.getElementById("chart").getContext("2d");

  const athletes = Object.keys(stats);
  if(athletes.length === 0){
    alert("Aucune donnée");
    return;
  }

  // 🔥 Construire 7 derniers jours
  const today = new Date();
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();
    d.setDate(today.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }

  const colors=[
    "#f04e23",
    "#ff7a45",
    "#ff9b63",
    "#ffb580",
    "#ffc89c",
    "#ffd8b5",
    "#ffe6cc"
  ];

  const datasets = days.map((day,index)=>{

    return {
      label:day,
      data: athletes.map(a=>{
        const val = stats[a][day];
        if(!val || val===0){
          return 0.2; // segment visible
        }
        return Number(val.toFixed(2));
      }),
      backgroundColor: athletes.map(a=>{
        const val = stats[a][day];
        return (!val || val===0) ? "#2a2f36" : colors[index];
      })
    };
  });

  chartInstance = new Chart(ctx,{
    type:"bar",
    data:{
      labels:athletes,
      datasets:datasets
    },
    options:{
      indexAxis:"y",
      responsive:true,
      plugins:{
        legend:{ labels:{ color:"white" }},
        tooltip:{
          callbacks:{
            label:function(context){
              if(context.raw===0.2){
                return "KM non fait";
              }
              return context.raw+" km";
            }
          }
        }
      },
      scales:{
        x:{
          stacked:true,
          beginAtZero:true,
          ticks:{color:"white"},
          title:{
            display:true,
            text:"Kilomètres cumulés",
            color:"white"
          }
        },
        y:{
          stacked:true,
          ticks:{color:"white"},
          title:{
            display:true,
            text:"Athlètes",
            color:"white"
          }
        }
      }
    },
    plugins:[totalPlugin]
  });
}

</script>

</body>
</html>
