<script>

let chartInstance = null;
const OBJECTIF_JOUR = 1;
const JOURS = 7;

window.onload = () => {
  runSync();
};

async function runSync() {

  try {

    console.log("Sync start");

    await fetch("/.netlify/functions/sync-activities");

    const res = await fetch(
      "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec?mode=getWeeklyStats"
    );

    const data = await res.json();

    console.log("Stats reçues:", data);

    if (!data.stats || Object.keys(data.stats).length === 0) {
      alert("Aucune donnée reçue.");
      return;
    }

    buildChart(data.stats);

  } catch (err) {
    console.error(err);
    alert("Erreur JS: " + err.message);
  }
}

function buildChart(stats) {

  if (typeof Chart === "undefined") {
    alert("Chart.js non chargé.");
    return;
  }

  if (chartInstance) chartInstance.destroy();

  const ctx = document.getElementById("chart").getContext("2d");
  const athletes = Object.keys(stats);

  const today = new Date();
  const days = [];

  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(today.getDate() - i);
    days.push(d.toISOString().slice(0, 10));
  }

  const doneData = [];
  const missingData = [];

  athletes.forEach(a => {

    let done = 0;
    let missing = 0;

    days.forEach(day => {
      const km = stats[a][day] || 0;

      if (km >= OBJECTIF_JOUR) {
        done += OBJECTIF_JOUR;
      } else {
        done += km;
        missing += (OBJECTIF_JOUR - km);
      }
    });

    doneData.push(done);
    missingData.push(missing);
  });

  const gradient = ctx.createLinearGradient(0, 0, 600, 0);
  gradient.addColorStop(0, "#ff512f");
  gradient.addColorStop(1, "#dd2476");

  chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: athletes,
      datasets: [
        {
          label: "KM faits",
          data: doneData,
          backgroundColor: gradient,
          stack: "total"
        },
        {
          label: "KM manquants",
          data: missingData,
          backgroundColor: "#2f3640",
          stack: "total"
        }
      ]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      scales: {
        x: {
          stacked: true,
          beginAtZero: true,
          max: OBJECTIF_JOUR * JOURS,
          ticks: { color: "white" }
        },
        y: {
          stacked: true,
          ticks: { color: "white" }
        }
      },
      plugins: {
        legend: {
          labels: { color: "white" }
        }
      }
    }
  });

}

</script>
