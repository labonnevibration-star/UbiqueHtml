<script>

let chartInstance = null;
const OBJECTIF_JOUR = 1;
const JOURS = 7;

async function runSync() {

  await fetch("/.netlify/functions/sync-activities");

  const res = await fetch(
    "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec?mode=getWeeklyStats"
  );

  const data = await res.json();
  buildChart(data.stats);
}

function buildChart(stats) {

  if (chartInstance) chartInstance.destroy();

  const ctx = document.getElementById("chart").getContext("2d");
  const athletes = Object.keys(stats);

  const today = new Date();
  const days = [];

  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(today.getDate() - i);
    days.push(d.toISOString().slice(0, 10));
  }

  const doneData = [];
  const missingData = [];
  const totals = [];

  athletes.forEach(a => {

    let done = 0;
    let missing = 0;

    days.forEach(day => {
      const km = stats[a][day] || 0;

      if (km >= OBJECTIF_JOUR) {
        done += OBJECTIF_JOUR;
      } else {
        done += km;
        missing += (OBJECTIF_JOUR - km);
      }
    });

    doneData.push(Number(done.toFixed(2)));
    missingData.push(Number(missing.toFixed(2)));
    totals.push(done + missing);
  });

  const gradient = ctx.createLinearGradient(0, 0, 600, 0);
  gradient.addColorStop(0, "#ff512f");
  gradient.addColorStop(1, "#dd2476");

  const accoladePlugin = {
    id: "accoladePlugin",
    afterDatasetsDraw(chart) {

      const { ctx, scales } = chart;
      ctx.save();
      ctx.strokeStyle = "white";
      ctx.fillStyle = "white";
      ctx.lineWidth = 2;
      ctx.font = "bold 12px sans-serif";

      athletes.forEach((athlete, i) => {

        const done = doneData[i];
        if (done === 0) return;

        const y = scales.y.getPixelForValue(i);
        const xStart = scales.x.getPixelForValue(0);
        const xEnd = scales.x.getPixelForValue(done);

        // Ligne horizontale accolade
        ctx.beginPath();
        ctx.moveTo(xStart, y - 18);
        ctx.lineTo(xEnd, y - 18);
        ctx.stroke();

        // Crochet gauche
        ctx.beginPath();
        ctx.moveTo(xStart, y - 18);
        ctx.lineTo(xStart, y - 12);
        ctx.stroke();

        // Crochet droite
        ctx.beginPath();
        ctx.moveTo(xEnd, y - 18);
        ctx.lineTo(xEnd, y - 12);
        ctx.stroke();

        // Texte km faits
        ctx.textAlign = "center";
        ctx.fillText(
          done.toFixed(1) + " km",
          (xStart + xEnd) / 2,
          y - 24
        );
      });

      ctx.restore();
    }
  };

  chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: athletes,
      datasets: [
        {
          label: "KM faits",
          data: doneData,
          backgroundColor: gradient,
          borderRadius: 8,
          stack: "total"
        },
        {
          label: "KM manquants",
          data: missingData,
          backgroundColor: "#2f3640",
          borderRadius: 8,
          stack: "total"
        }
      ]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      plugins: {
        legend: {
          labels: { color: "white" }
        },
        tooltip: {
          callbacks: {
            label: function (ctx) {
              return ctx.dataset.label + " : " + ctx.raw + " km";
            }
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          beginAtZero: true,
          max: OBJECTIF_JOUR * JOURS,
          ticks: { color: "white" },
          title: {
            display: true,
            text: "Objectif semaine : " + (OBJECTIF_JOUR * JOURS) + " km",
            color: "white"
          }
        },
        y: {
          stacked: true,
          ticks: { color: "white" }
        }
      }
    },
    plugins: [accoladePlugin]
  });
}

</script>
