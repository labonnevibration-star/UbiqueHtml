<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE — Segmented Weekly</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:30px;
}
.container{ max-width:1100px; margin:auto; }
h1{ margin:0 0 18px; }
button{
  padding:12px 20px;
  background:linear-gradient(90deg,#ff512f,#dd2476);
  border:none;
  border-radius:10px;
  color:white;
  font-weight:900;
  cursor:pointer;
  margin-bottom:18px;
  box-shadow:0 10px 24px rgba(221,36,118,.25);
}
canvas{
  background:#161b22;
  border-radius:14px;
  padding:18px;
}
.note{
  margin-top:10px;
  color:#8b949e;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 Weekly Performance</h1>
  <button onclick="loadData()">Sync</button>
  <canvas id="chart" height="480"></canvas>
  <div class="note">Chaque segment = 1 km (objectif/jour). Noir = non fait / pas de data.</div>
</div>

<script>
const OBJECTIF = 1;     // 1 km / jour
const JOURS = 7;        // semaine
let chart;

function last7Days(){
  const t = new Date();
  t.setHours(0,0,0,0);
  const arr=[];
  for(let i=6;i>=0;i--){
    const d=new Date(t);
    d.setDate(t.getDate()-i);
    arr.push(d.toISOString().slice(0,10));
  }
  return arr;
}

async function loadData(){

  let stats;

  try{
    // (Optionnel) sync Strava -> Sheet
    await fetch("/.netlify/functions/sync-activities");

    const res = await fetch(
      "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec?mode=getWeeklyStats"
    );
    const data = await res.json();
    stats = data.stats;
  }catch(e){
    // fallback demo
    stats={
      "Lolo":{"2026-02-22":1,"2026-02-23":0,"2026-02-24":0.5,"2026-02-25":1},
      "Gabcar":{"2026-02-22":1,"2026-02-23":1,"2026-02-24":1,"2026-02-25":1,"2026-02-26":1,"2026-02-27":1,"2026-02-28":1}
    };
  }

  render(stats);
}

function render(stats){

  const ctx = document.getElementById("chart").getContext("2d");
  if(chart) chart.destroy();

  const days = last7Days();
  const athletes = Object.keys(stats || {});

  // ✅ Total toujours 7 km (objectif semaine)
  const totals = athletes.map(()=> OBJECTIF * JOURS);

  const gradient = ctx.createLinearGradient(0,0,0,520);
  gradient.addColorStop(0,"#ff512f");
  gradient.addColorStop(1,"#dd2476");

  const segmentPlugin = {
    id:"segments",
    afterDatasetsDraw(chart){

      const {ctx, scales} = chart;
      ctx.save();
      ctx.font="11px sans-serif";
      ctx.textAlign="center";
      ctx.textBaseline="middle";

      athletes.forEach((athlete,i)=>{

        const bar = chart.getDatasetMeta(0).data[i];
        if(!bar) return;

        const x = scales.x.getPixelForValue(i);
        const barWidth = bar.width;

        // On stack 7 segments de 1 km, du bas vers le haut
        let cumulative = 0;

        days.forEach(day=>{

          // km réel du jour (si pas de data => 0)
          const kmReal = Number(stats?.[athlete]?.[day] || 0);

          // ✅ segmentHeight = 1 km TOUJOURS
          const yStart = scales.y.getPixelForValue(cumulative);
          const yEnd   = scales.y.getPixelForValue(cumulative + OBJECTIF);
          const segH   = yStart - yEnd;

          // ✅ si kmReal >= 1 => segment dégradé
          // ✅ sinon segment NOIR (non fait ou incomplet)
          const ok = kmReal >= OBJECTIF;

          ctx.fillStyle = ok ? gradient : "#000";
          ctx.fillRect(
            x - barWidth/2,
            yEnd,
            barWidth,
            segH
          );

          // Date dans le segment
          ctx.fillStyle = ok ? "#0b0f14" : "#ffffff";
          // (sur dégradé, texte foncé = plus lisible)
          ctx.fillText(day.slice(5), x, yEnd + segH/2);

          cumulative += OBJECTIF;
        });
      });

      ctx.restore();
    }
  };

  chart = new Chart(ctx,{
    type:"bar",
    data:{
      labels:athletes,
      datasets:[{
        data:totals,
        backgroundColor:"transparent" // on dessine nous-mêmes
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:(ctx)=>{
              const athlete = athletes[ctx.dataIndex];
              return athlete;
            }
          }
        }
      },
      scales:{
        x:{ ticks:{ color:"#c9d1d9" }, grid:{ color:"#21262d" } },
        y:{
          beginAtZero:true,
          max:OBJECTIF*JOURS,
          ticks:{ color:"#8b949e", stepSize:1 },
          grid:{ color:"#21262d" },
          title:{
            display:true,
            text:`Objectif semaine : ${OBJECTIF*JOURS} km (1 segment = 1 km)`,
            color:"#c9d1d9"
          }
        }
      }
    },
    plugins:[segmentPlugin]
  });

}

window.onload = loadData;
</script>

</body>
</html>
