<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Dashboard — UBIQUE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#0c1117;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:40px;
}
.container{
  max-width:1000px;
  margin:auto;
}
h1{
  font-size:26px;
  margin-bottom:10px;
}
button{
  padding:14px 20px;
  background:#f04e23;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:700;
  cursor:pointer;
  margin-bottom:30px;
}
button:hover{
  background:#ff6238;
}
canvas{
  background:#161b22;
  border-radius:12px;
  padding:20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 UBIQUE — 7 derniers jours</h1>
  <button onclick="runSync()">Sync & Afficher</button>
  <canvas id="chart" height="120"></canvas>
</div>

<script>

async function runSync(){

  // 1️⃣ Lance la sync Netlify
  await fetch("/.netlify/functions/sync-activities");

  // 2️⃣ Récupère les stats semaine
  const res = await fetch("https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec?mode=getWeeklyStats");
  const data = await res.json();

  const stats = data.stats;
  buildChart(stats);
}

function buildChart(stats){

  const ctx = document.getElementById("chart").getContext("2d");

  // 🔥 7 derniers jours
  const today = new Date();
  const days = [];

  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(today.getDate() - i);
    days.push(d.toISOString().split("T")[0]);
  }

  const colors = [
    "#f04e23",
    "#ff7a45",
    "#ff9b63",
    "#ffb580",
    "#ffc89c",
    "#ffd8b5",
    "#ffe6cc"
  ];

  const datasets = days.map((day,index)=>({
    label: day,
    data: Object.keys(stats).map(athlete =>
      stats[athlete][day] ? Number(stats[athlete][day].toFixed(2)) : 0
    ),
    backgroundColor: colors[index]
  }));

  new Chart(ctx,{
    type:"bar",
    data:{
      labels: Object.keys(stats),
      datasets: datasets
    },
    options:{
      indexAxis:"y",
      responsive:true,
      plugins:{
        legend:{
          labels:{color:"white"}
        }
      },
      scales:{
        x:{
          stacked:true,
          beginAtZero:true,
          ticks:{color:"white"},
          title:{
            display:true,
            text:"Kilomètres cumulés (7 jours)",
            color:"white"
          }
        },
        y:{
          stacked:true,
          ticks:{color:"white"},
          title:{
            display:true,
            text:"Athlètes",
            color:"white"
          }
        }
      }
    }
  });
}

</script>

</body>
</html>
