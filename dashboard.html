<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE — Weekly Performance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#0d1117;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:20px;
}
.container{
  max-width:1200px;
  margin:auto;
}
h1{
  font-size:24px;
  margin-bottom:25px;
}
button{
  padding:14px 22px;
  background:linear-gradient(90deg,#ff512f,#ff9966);
  border:none;
  border-radius:8px;
  color:white;
  font-weight:700;
  cursor:pointer;
  margin-bottom:35px;
}
button:hover{ opacity:0.9; }
canvas{
  background:#161b22;
  border-radius:14px;
  padding:20px;
}
@media(max-width:768px){
  h1{font-size:18px;}
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 UBIQUE — Performance Hebdomadaire</h1>
  <button onclick="runSync()">Sync & Afficher</button>
  <canvas id="chart"></canvas>
</div>

<script>

let chartInstance = null;

const totalPlugin = {
  id:'totalPlugin',
  afterDatasetsDraw(chart){
    const {ctx} = chart;
    ctx.save();
    ctx.fillStyle="white";
    ctx.font="bold 13px sans-serif";

    chart.data.labels.forEach((label,i)=>{
      let total=0;
      chart.data.datasets.forEach(ds=>{
        total += ds.realData[i] || 0;
      });

      const meta = chart.getDatasetMeta(0);
      const bar = meta.data[i];

      if(bar){
        ctx.textAlign="center";
        ctx.fillText(
          total.toFixed(1)+" km",
          bar.x,
          bar.y - 8
        );
      }
    });

    ctx.restore();
  }
};

async function runSync(){

  await fetch("/.netlify/functions/sync-activities");

  const res = await fetch("https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec?mode=getWeeklyStats");
  const data = await res.json();

  buildChart(data.stats);
}

function buildChart(stats){

  if(chartInstance){
    chartInstance.destroy();
  }

  const ctx = document.getElementById("chart").getContext("2d");
  const athletes = Object.keys(stats);

  const today = new Date();
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();
    d.setDate(today.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }

  const colors=[
    "#ff512f",
    "#ff6f3c",
    "#ff8b49",
    "#ffa256",
    "#ffb864",
    "#ffc672",
    "#ffd480"
  ];

  const datasets = days.map((day,index)=>{

    const realData=[];
    const displayData=[];
    const bgColors=[];

    athletes.forEach(a=>{
      const val = stats[a][day] || 0;
      realData.push(val);

      if(val===0){
        displayData.push(0.5); // segment discret
        bgColors.push("#2b313a");
      }else{
        displayData.push(Number(val.toFixed(2)));
        bgColors.push(colors[index]);
      }
    });

    return {
      label:day,
      data:displayData,
      realData:realData,
      backgroundColor:bgColors
    };
  });

  chartInstance = new Chart(ctx,{
    type:"bar",
    data:{
      labels:athletes,
      datasets:datasets
    },
    options:{
      responsive:true,
      plugins:{
        legend:{ labels:{ color:"white" }},
        tooltip:{
          callbacks:{
            label:function(context){
              const realVal = context.dataset.realData[context.dataIndex];
              if(realVal===0){
                return "Objectif non atteint";
              }
              return realVal.toFixed(2)+" km";
            }
          }
        }
      },
      scales:{
        x:{
          stacked:true,
          ticks:{color:"white"}
        },
        y:{
          stacked:true,
          beginAtZero:true,
          ticks:{color:"white"},
          suggestedMax: calculateSuggestedMax(stats)
        }
      }
    },
    plugins:[totalPlugin]
  });
}

function calculateSuggestedMax(stats){
  let maxTotal = 0;

  Object.values(stats).forEach(days=>{
    let total=0;
    Object.values(days).forEach(val=> total+=val);
    if(total>maxTotal) maxTotal=total;
  });

  return Math.ceil(maxTotal * 1.2);
}

</script>

</body>
</html>
