<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>UBIQUE — Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#0f141a;
  color:#e6edf3;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:30px;
}

.container{
  max-width:1100px;
  margin:auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:40px;
}

h1{
  font-size:22px;
  letter-spacing:1px;
}

.sync-btn{
  padding:14px 24px;
  background:linear-gradient(90deg,#ff512f,#dd2476);
  border:none;
  border-radius:10px;
  color:white;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(221,36,118,0.3);
  transition:all .2s ease;
}

.sync-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 28px rgba(221,36,118,0.45);
}

.card{
  background:#161b22;
  border-radius:16px;
  padding:30px;
}

canvas{
  width:100% !important;
  height:auto !important;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>🔥 Weekly Performance</h1>
    <button class="sync-btn" onclick="runSync()">Sync Data</button>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>

let chartInstance = null;
const OBJECTIF_JOUR = 1;
const JOURS = 7;

async function runSync(){

  try{

    await fetch("/.netlify/functions/sync-activities");

    const res = await fetch(
      "https://script.google.com/macros/s/AKfycby26yMqbGJmCZ9luoJftDTk8d8q4zV_8pe7dn1OXsCF8MJqhTGtkhH8hRbRuP0KUmEVaQ/exec?mode=getWeeklyStats"
    );

    const data = await res.json();

    if(!data.stats){
      alert("Aucune donnée reçue");
      return;
    }

    buildChart(data.stats);

  }catch(e){
    alert("Erreur Sync");
    console.error(e);
  }
}

function buildChart(stats){

  if(chartInstance) chartInstance.destroy();

  const ctx = document.getElementById("chart").getContext("2d");
  const athletes = Object.keys(stats);

  const today = new Date();
  const days = [];

  for(let i=6;i>=0;i--){
    const d=new Date();
    d.setDate(today.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }

  const doneData=[];
  const missingData=[];

  athletes.forEach(a=>{

    let done=0;
    let missing=0;

    days.forEach(day=>{
      const km = stats[a][day] || 0;

      if(km >= OBJECTIF_JOUR){
        done += OBJECTIF_JOUR;
      }else{
        done += km;
        missing += (OBJECTIF_JOUR - km);
      }
    });

    doneData.push(Number(done.toFixed(2)));
    missingData.push(Number(missing.toFixed(2)));
  });

  const gradient = ctx.createLinearGradient(0,0,800,0);
  gradient.addColorStop(0,"#ff512f");
  gradient.addColorStop(1,"#dd2476");

  chartInstance = new Chart(ctx,{
    type:"bar",
    data:{
      labels:athletes,
      datasets:[
        {
          label:"KM validés",
          data:doneData,
          backgroundColor:gradient,
          borderRadius:12,
          stack:"total"
        },
        {
          label:"KM manquants",
          data:missingData,
          backgroundColor:"#2d333b",
          borderRadius:12,
          stack:"total"
        }
      ]
    },
    options:{
      indexAxis:"y",
      responsive:true,
      animation:{
        duration:800,
        easing:"easeOutQuart"
      },
      plugins:{
        legend:{
          labels:{
            color:"#c9d1d9",
            font:{weight:"600"}
          }
        },
        tooltip:{
          backgroundColor:"#111",
          titleColor:"#fff",
          bodyColor:"#fff",
          borderColor:"#ff512f",
          borderWidth:1
        }
      },
      scales:{
        x:{
          stacked:true,
          beginAtZero:true,
          max:OBJECTIF_JOUR*JOURS,
          ticks:{color:"#8b949e"},
          grid:{color:"#21262d"}
        },
        y:{
          stacked:true,
          ticks:{color:"#c9d1d9"},
          grid:{display:false}
        }
      }
    }
  });

}

// Optionnel : auto-load au démarrage
window.onload = runSync;

</script>

</body>
</html>
