<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Connexion Strava — UBIQUE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0b0f14;
  --card:#161b22;
  --border:#2a2f36;
  --text:#e6edf3;
  --muted:#8b949e;
  --accent:#fc4c02; /* Strava orange */
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:
    radial-gradient(800px 500px at 50% -10%, rgba(252,76,2,.15), transparent 60%),
    var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}

.card{
  width:100%;
  max-width:460px;
  background:var(--card);
  padding:50px 40px;
  border-radius:16px;
  border:1px solid var(--border);
  box-shadow:0 30px 90px rgba(0,0,0,.6);
  text-align:center;
}

.flame{
  font-size:28px;
  margin-bottom:18px;
}

h2{
  font-size:22px;
  margin-bottom:10px;
}

.subtitle{
  font-size:14px;
  color:var(--muted);
  margin-bottom:35px;
  line-height:1.5;
}

.button{
  display:block;
  width:100%;
  padding:18px;
  border-radius:10px;
  background:linear-gradient(90deg,#fc4c02,#ff7a3d);
  color:white;
  text-decoration:none;
  font-weight:800;
  letter-spacing:1px;
  transition:.15s ease;
}

.button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(252,76,2,.3);
}

.footer{
  margin-top:30px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="card">

  <div class="flame">🔥</div>

  <h2>Synchronisation Strava</h2>
  <div class="subtitle">
    Autorise l’accès pour activer le suivi automatique.
  </div>

  <a class="button"
     href="https://www.strava.com/oauth/authorize?client_id=200307&response_type=code&redirect_uri=https%3A%2F%2Fubique.netlify.app%2F.netlify%2Ffunctions%2Fstrava-auth&approval_prompt=auto&scope=read,activity:read_all">
     CONNECTER STRAVA
  </a>

  <div class="footer">
    Discipline quotidienne.
  </div>

</div>

</body>
</html>
