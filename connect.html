<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Connexion Strava — UBIQUE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  background:#0c1117;
  font-family:system-ui;
  color:#e6edf3;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  width:420px;
  background:#161b22;
  padding:50px 40px;
  border-radius:14px;
  text-align:center;
  border:1px solid #2a2f36;
}
a{
  display:block;
  width:100%;
  padding:16px;
  background:#fc4c02;
  color:white;
  font-weight:800;
  border-radius:8px;
  text-decoration:none;
}
</style>
</head>
<body>

<div class="card">
  <h2>🔥 Synchronisation Strava</h2>
  <p>Active le suivi automatique.</p>
  <a id="stravaLink">CONNECTER STRAVA</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const email = params.get("email");

if (!email) {
  alert("Email manquant");
  window.location.href = "/signup.html";
}

const stravaUrl =
  "https://www.strava.com/oauth/authorize?client_id=200307" +
  "&response_type=code" +
  "&redirect_uri=" + encodeURIComponent("https://ubique.netlify.app/.netlify/functions/strava-auth") +
  "&approval_prompt=auto" +
  "&scope=read,activity:read_all" +
  "&state=" + encodeURIComponent(email);

document.getElementById("stravaLink").href = stravaUrl;
</script>

</body>
</html>
